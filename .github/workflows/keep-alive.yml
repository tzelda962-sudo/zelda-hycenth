name: Keep Supabase Alive

on:
  schedule:
    # Run at 12:00 on Monday and Thursday
    - cron: "0 12 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/site_content?limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
