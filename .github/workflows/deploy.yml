name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Static Site
        run: npm run generate

      - name: Deploy to Hostinger via LFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          lftp -c "
          set ftp:ssl-allow yes; 
          set ssl:verify-certificate no; 
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; 
          mkdir -p domains/zeldaandhycenth.com/public_html; 
          mirror -R -v --parallel=4 --exclude .git/ --exclude .gitattributes --exclude .gitignore ./.output/public/ domains/zeldaandhycenth.com/public_html/
          "
